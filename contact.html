<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Stylo</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="container">

    <div class="logo">STYLO</div>

    <nav>
      <ul id="nav-links">
        <span id="close-menu" class="close-menu">&times;</span>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>

    <div class="header-icons">
      <!-- ✅ CART BUTTON -->
      <a href="#" id="open-cart" class="cart-icon">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>

      <!-- MENU -->
      <div class="menu-toggle" id="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </div>
    </div>

  </div>
</header>

<!-- ===== CART SIDEBAR ===== -->
<div id="cart-sidebar">

  <span id="close-cart">&times;</span>

  <h2>Your Cart</h2>

  <div id="cart-items"></div>

  <div class="cart-footer">
    <h3>Total: $<span id="cart-total">0</span></h3>
    <button class="btn" id="checkout-btn">Checkout</button>
  </div>

</div>

<!-- ===== HERO ===== -->
<section class="contact-hero">
  <h1>Contact Us</h1>
  <p>We’d love to hear from you</p>
</section>

<!-- ===== FORM ===== -->
<section class="contact-section">

  <form class="contact-form">

    <input type="text" placeholder="Your Name" required>

    <input type="email" placeholder="Your Email" required>

    <textarea placeholder="Your Message" rows="5" required></textarea>

    <button type="submit">Send Message</button>

  </form>

</section>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <div class="footer-container">

    <div class="footer-col">
      <h3>Quick Links</h3>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h3>Customer Service</h3>
      <ul>
        <li>FAQ</li>
        <li>Shipping & Returns</li>
        <li>Contact Us</li>
      </ul>
    </div>

    <div class="footer-col">
      <h3>Follow Us</h3>
      <div class="socials">
        <i class="fa-brands fa-facebook-f"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-twitter"></i>
      </div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Stylo. All rights reserved.</p>
  </div>
</footer>

<!-- ===== JS ===== -->
<script src="script.js"></script>

</body>
</html>
