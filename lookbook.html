<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lookbook - Stylo</title>

  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="container">

    <div class="logo">STYLO</div>

    <nav>
      <ul id="nav-links">
        <span id="close-menu" class="close-menu">&times;</span>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <div class="header-icons">
      <a href="javascript:void(0)" id="open-cart" class="cart-icon">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>

      <div class="menu-toggle" id="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </div>
    </div>

  </div>
</header>

<!-- ===== CART SIDEBAR ===== -->
<div id="cart-sidebar">
  <span id="close-cart">&times;</span>
  <h2>Your Cart</h2>
  <div id="cart-items"></div>

  <div class="cart-footer">
    <h3>Total: $<span id="cart-total">0</span></h3>
    <button class="btn" id="checkout-btn">Checkout</button>
  </div>
</div>

<!-- ===== HERO ===== -->
<section class="lookbook-hero">

</section>

<section class="lookbook">

  <div class="lookbook-grid">

    <img src="assets/chris-lynch-z56-3HeECRk-unsplash.jpg">
    <img src="assets/mostafa-mahmoudi-3OZr-hLbsq0-unsplash.jpg">

    <img src="assets/asif-azr-c7SlXuUILWw-unsplash.jpg">

    <div class="footer-col">
      <h3>Quick Links</h3>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h3>Customer Service</h3>
      <ul>
        <li>FAQ</li>
        <li>Shipping</li>
        <li>Returns</li>
      </ul>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Stylo</p>
  </div>
